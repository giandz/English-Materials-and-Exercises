<html>
	<head><meta charset="UTF-8">

<style>
  .activity-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem; flex-wrap:wrap; gap:8px; }
  .activity-hint { font-size:13px; color:var(--color-text-secondary); }
  .score-pill { font-size:13px; color:var(--color-text-secondary); }
  .bank-label { font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:var(--color-text-secondary); margin-bottom:10px; }
  .bank { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:1.5rem; min-height:52px; padding:10px; background:var(--color-background-secondary); border-radius:var(--border-radius-lg); border:0.5px solid var(--color-border-tertiary); }
  .pronoun-chip {
    font-size:18px; font-weight:500; padding:9px 22px;
    border-radius:var(--border-radius-md);
    border:1.5px solid var(--color-border-secondary);
    background:var(--color-background-primary);
    color:var(--color-text-primary);
    cursor:grab; user-select:none; -webkit-user-select:none;
    touch-action:none;
    transition:border-color 0.12s, background 0.12s, opacity 0.12s;
  }
  .pronoun-chip.dragging { opacity:0.4; }
  .img-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
  .img-card { border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); overflow:hidden; background:var(--color-background-primary); }
  .img-slot {
    height:100px; background:var(--color-background-secondary);
    display:flex; align-items:center; justify-content:center;
    border-bottom:0.5px solid var(--color-border-tertiary);
    transition:background 0.12s;
  }
  .img-slot img { width:100%; height:100%; object-fit:contain; padding:8px; display:none; }
  .img-placeholder { display:flex; flex-direction:column; align-items:center; gap:5px; }
  .img-placeholder-icon { font-size:24px; color:var(--color-text-tertiary); }
  .img-placeholder-text { font-size:10px; color:var(--color-text-tertiary); font-family:var(--font-mono); text-align:center; padding:0 4px; }
  .img-slot.over    { background:var(--color-background-info); }
  .img-slot.matched { background:var(--color-background-success); }
  .img-slot.wrong-drop { animation:shake 0.3s; }
  .drop-zone-label { padding:7px 10px; display:flex; align-items:center; justify-content:center; min-height:38px; }
  .dz-filename { font-size:10px; color:var(--color-text-tertiary); font-family:var(--font-mono); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:100px; }
  .chip-placed { font-size:15px; font-weight:500; }
  .chip-placed.correct { color:var(--color-text-success); }
  .chip-placed.wrong   { color:var(--color-text-danger); animation:shake 0.3s; }
  .reset-row { display:flex; gap:8px; align-items:center; margin-top:1.25rem; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
</style>
<link rel="stylesheet" href="general.css">

</head>
<body class="exercise-page">
	
<div style="padding:0.75rem 0;">
  <div class="activity-bar">
    <span class="activity-hint"><i class="ti ti-drag-drop" aria-hidden="true" style="font-size:15px;vertical-align:-1px;margin-right:4px;"></i>Drag word → image.</span>
    <span class="score-pill"><span id="score">0</span> / 10 matched</span>
  </div>
  <div class="bank-label">Pronoun bank</div>
  <div class="bank" id="bank"></div>
  <div class="img-grid" id="img-grid"></div>
  <div class="reset-row">
    <button id="reset-btn">↺ Reset</button>
    <span style="font-size:13px;color:var(--color-text-secondary);" id="feedback-msg"></span>
  </div>
</div>

<script>
const items = [
  { pronoun:"I",    file:"pronoun_i.png",      label:"pronoun I",        id:"i_1"    },
  { pronoun:"you",  file:"pronoun_you_1.png",   label:"pronoun you 1",    id:"you_1"  },
  { pronoun:"you",  file:"pronoun_you_2.png",   label:"pronoun you 2",    id:"you_2"  },
  { pronoun:"he",   file:"pronoun_he.png",      label:"pronoun he",       id:"he_1"   },
  { pronoun:"she",  file:"pronoun_she.png",     label:"pronoun she",      id:"she_1"  },
  { pronoun:"it",   file:"pronoun_it_1.png",    label:"pronoun it 1",     id:"it_1"   },
  { pronoun:"it",   file:"pronoun_it_2.png",    label:"pronoun it 2",     id:"it_2"   },
  { pronoun:"we",   file:"pronoun_we.png",      label:"pronoun we",       id:"we_1"   },
  { pronoun:"they", file:"pronoun_they_1.png",  label:"pronoun they 1",   id:"they_1" },
  { pronoun:"they", file:"pronoun_they_2.png",  label:"pronoun they 2",   id:"they_2" },
];

const TOTAL = items.length;
let matched = 0;
let dragging = null;
let touchClone = null;

function shuffle(a) {
  const b = [...a];
  for (let i = b.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]];
  }
  return b;
}

function handleDrop(zone, item) {
  if (!dragging || !zone || !item) return;
  if (zone.dataset.matched) return;

  const droppedPronoun = dragging.dataset.pronoun;
  const targetPronoun  = zone.dataset.pronoun;
  const placedEl = document.getElementById('placed-' + item.id);

  if (droppedPronoun === targetPronoun) {
    zone.dataset.matched = 'true';
    zone.classList.add('matched');
    if (placedEl) { placedEl.textContent = droppedPronoun; placedEl.className = 'chip-placed correct'; }
    dragging.remove();
    matched++;
    document.getElementById('score').textContent = matched;
    if (matched === TOTAL) {
      const fb = document.getElementById('feedback-msg');
      fb.textContent = 'All matched! Well done!';
      fb.style.color = 'var(--color-text-success)';
    }
  } else {
    if (placedEl) {
      placedEl.textContent = '✗ ' + droppedPronoun;
      placedEl.className = 'chip-placed wrong';
    }
    zone.classList.add('wrong-drop');
    setTimeout(() => {
      zone.classList.remove('wrong-drop');
      if (placedEl) { placedEl.textContent = ''; placedEl.className = 'chip-placed'; }
    }, 700);
  }
}

function makeDraggable(chip) {
  chip.setAttribute('draggable', 'true');

  chip.addEventListener('dragstart', e => {
    dragging = chip;
    chip.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  chip.addEventListener('dragend', () => {
    chip.classList.remove('dragging');
    dragging = null;
  });

  chip.addEventListener('touchstart', e => {
    e.preventDefault();
    dragging = chip;
    chip.classList.add('dragging');
    const rect = chip.getBoundingClientRect();
    touchClone = chip.cloneNode(true);
    touchClone.style.cssText = `
      position:fixed;
      left:${rect.left}px;
      top:${rect.top}px;
      width:${rect.width}px;
      pointer-events:none;
      opacity:0.85;
      z-index:9999;
      margin:0;
      touch-action:none;
    `;
    document.body.appendChild(touchClone);
  }, { passive: false });

  chip.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!touchClone) return;
    const touch = e.touches[0];
    const rect = touchClone.getBoundingClientRect();
    touchClone.style.left = (touch.clientX - rect.width / 2) + 'px';
    touchClone.style.top  = (touch.clientY - rect.height / 2) + 'px';

    touchClone.style.display = 'none';
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    touchClone.style.display = '';
    document.querySelectorAll('.img-slot').forEach(z => z.classList.remove('over'));
    const zone = el ? el.closest('.img-slot') : null;
    if (zone && !zone.dataset.matched) zone.classList.add('over');
  }, { passive: false });

  chip.addEventListener('touchend', e => {
    e.preventDefault();
    if (touchClone) { touchClone.remove(); touchClone = null; }
    if (dragging) dragging.classList.remove('dragging');
    document.querySelectorAll('.img-slot').forEach(z => z.classList.remove('over'));

    const touch = e.changedTouches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const zone = el ? el.closest('.img-slot') : null;
    if (zone) {
      const item = items.find(i => i.id === zone.dataset.id);
      handleDrop(zone, item);
    }
    dragging = null;
  }, { passive: false });
}

function wireDropZones() {
  document.querySelectorAll('.img-slot').forEach(zone => {
    zone.addEventListener('dragover',  e => { e.preventDefault(); if (!zone.dataset.matched) zone.classList.add('over'); });
    zone.addEventListener('dragleave', ()  => zone.classList.remove('over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('over');
      const item = items.find(i => i.id === zone.dataset.id);
      handleDrop(zone, item);
    });
  });
}

function build() {
  matched = 0;
  dragging = null;
  if (touchClone) { touchClone.remove(); touchClone = null; }
  document.getElementById('score').textContent = '0';
  document.getElementById('feedback-msg').textContent = '';

  const bank = document.getElementById('bank');
  bank.innerHTML = '';
  shuffle(items.map(item => item.pronoun)).forEach(pronoun => {
    const chip = document.createElement('div');
    chip.className = 'pronoun-chip';
    chip.textContent = pronoun;
    chip.dataset.pronoun = pronoun;
    bank.appendChild(chip);
    makeDraggable(chip);
  });

  const grid = document.getElementById('img-grid');
  grid.innerHTML = '';
  shuffle([...items]).forEach(item => {
    const card = document.createElement('div');
    card.className = 'img-card';

    const slot = document.createElement('div');
    slot.className = 'img-slot';
    slot.dataset.pronoun = item.pronoun;
    slot.dataset.id = item.id;

    const placeholder = document.createElement('div');
    placeholder.className = 'img-placeholder';
    placeholder.innerHTML = `<i class="ti ti-photo img-placeholder-icon" aria-hidden="true"></i><span class="img-placeholder-text">${item.file}</span>`;

    const img = document.createElement('img');
    img.src = item.file;
    img.alt = item.label;
    img.addEventListener('load', () => { placeholder.style.display = 'none'; img.style.display = 'block'; });

    slot.appendChild(placeholder);
    slot.appendChild(img);

    const labelRow = document.createElement('div');
    labelRow.className = 'drop-zone-label';
    labelRow.innerHTML = `<span class="chip-placed" id="placed-${item.id}"></span>`;

    card.appendChild(slot);
    card.appendChild(labelRow);
    grid.appendChild(card);
  });

  wireDropZones();
}

document.getElementById('reset-btn').addEventListener('click', build);
build();
</script>
		<div id="theme-toggle-wrap">
  		<button id="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle light/dark mode">
    		<span id="theme-icon">☀️</span>
  		</button>
	</div>
	<script src="theme-toggle-behavior.js"></script>
</body>
</html>
