<html>

<head>
	<link href="https://fonts.googleapis.com/css?family=Nunito" rel="stylesheet">
	<script src="https://www.youtube.com/player_api"></script>
<!--
	<script type="text/javascript" src="https://cdn.webrtc.ecl.ntt.com/skyway-latest.js"></script>
-->
<!--
	<script type="text/javascript" src="https://airspeak.academy/scripts/classloader.js"></script>
-->
	<script type="text/javascript" src="classloader.js"></script>
	<link rel="stylesheet" href="lesson2.css">
	<link rel="stylesheet" href="visual.css">
	
	<meta charset="UTF-8">
</head>

<body onload="processMaterial()">
	<div id="img-cache" style="position:absolute;z-index:-1000;left:-10000;top:-10000;opacity:0;"></div>
	<div id="toolbar-btn-container">
		<button id="toolbar-button" onclick="toggleToolbar()">🛠️</button>
	</div>
	<div id="chat-btn-container">
		<button id="chat-button" onclick="toggleChat()">💬</button>
	</div>
	<div id="lesson-toolbar">
		<!-- <label>🔍</label>
		<span>➖</span>
		<input type="range" id="zoomer" min="5" value="10" max="40" oninput="setZoom()">
		<span>➕</span> -->
		<button onclick="toggleTree(this)">📖</button>
		<button onclick="invertColors(this)">🌙</button>
		<label>🌐</label>
		<input type="text" list="language" name="language">
		<label>🏫</label>
		<input type="text" list="course" name="course">
		<label>🎛️</label>
		<input type="text" list="level" name="level">
		<label>📓</label>
		<input type="text" list="class" name="">
		<button onclick="loadClass()">🎬</button>
	</div>
	<div class="sheet">
		<img id="lesson-header" src="header.png" />
		<a href="https://airspeak.academy"><img id="lesson-logo" src="asa-header-logo.png"/></a>
		<img id="lesson-flag" />
		<span id="lesson-lang"></span>
		<img id="wordmark" src="asa-logo-text.png" />
		<a><img id="hex" src="asa-hex-a1-empty.png" /></a>
		<span id="lesson-type"></span>
		<span id="lesson-subtype"></span>
		<div id="lesson-content">
			<img class="curlicue1" src="curlicue1.png" />
			<img class="curlicue2" src="curlicue2.png" />
		</div>
		<img id="lesson-footer" src="footer.png" />
		<img id="footer-web" src="footer-web.png" />
		<img id="footer-soc" src="footer-soc.png" />
	</div>

	<div id="chat" class="chat-stowed" style="left:calc(100% - 70mm); top: 12mm">
		<div id="chat-move-handle"></div>

		<div id="chat-faces">
			<div class="chat-controls" style="position: absolute; top: 0">
				<button id="random-icon-btn" onclick="randomIcon()">🎲</button>
				<button id="random-color-btn" onclick="randomColor()">🎨</button>
				<span id="my-icon"></span>
				<span id="my-name" colorhex="FFFFFF" contenteditable="true" spellcheck="false" autocapitalize="none" autocorrect="off"></span>
				<button id="setup-chat" onclick="setupChat()">📛</button>
			</div>
			<div id="their-faces"></div>
			<video id="my-face"></video>
			<div class="chat-controls" style="position: absolute; bottom: 0">
				<button id="join-btn" style="filter:saturate(0);" disabled="true">✔️</button>
				<span id="room-name" contenteditable="true" spellcheck="false" autocapitalize="none" autocorrect="off"></span>
				<button id="mute-mike-btn" muted="false">🎤</button>
				<button id="mute-cam-btn" muted="false">🎥</button>
				<button id="hangup-btn">❌</button>
			</div>
		</div>
		<div id="room-chat">
			<div id="chat-text"></div>
			<div class="chat-controls">
				<a id="save-chat-btn" style="cursor: pointer;"><button style="pointer-events: none;">💾</button></a>
				<span id="send-text" contenteditable="true" spellcheck="false" autocapitalize="none" autocorrect="off"></span>
				<!-- <button id="send-file-btn">📎</button> -->
				<input id="file-input" type="file" name="name" style="display: none;"/>
				<button id="send-btn">✉️</button>
				<div id="chat-resize-handle"></div>
			</div>
		</div>
	</div>

	<datalist id="language">
		<option value="en">English</option>
		<option value="es">Español</option>
		<option value="fr">Français</option>
		<option value="pt">Português</option>
		<option value="de">Deutsch</option>
		<option value="it">Italiano</option>
	</datalist>
	<datalist id="level">
		<option value="A1"></option>
		<option value="A2"></option>
		<option value="B1"></option>
		<option value="B2"></option>
		<option value="C1"></option>
		<option value="C2"></option>
		<option value="FF"></option>
	</datalist>
	<datalist id="course">
		<option value="ESL"></option>
		<option value="ESP"></option>
		<option value="ELE"></option>
	</datalist>
   
<!--
	<script type="text/javascript" src="sampleclass.js"></script>
-->

	<script type="text/javascript" src="lesson.js"></script>
	<script type="text/javascript" src="chat.js"></script>
	<script type="text/javascript" src="resizenmove.js"></script>
	
</body>

</html>
