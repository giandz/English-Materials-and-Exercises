<html>
	<head><meta charset="UTF-8">
<style>
  .sec-div{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-muted);display:flex;align-items:center;gap:8px;margin:1.75rem 0 1rem;}
  .sec-div::before,.sec-div::after{content:'';flex:1;height:.5px;background:var(--border);}
  .setting-chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:3px 10px;border-radius:20px;background:var(--surface-1);border:.5px solid var(--border);color:var(--color-text-secondary);margin-bottom:1rem;}
  .bubble-wrap{display:flex;gap:10px;align-items:flex-end;margin-bottom:14px;}
  .bubble-wrap.right{flex-direction:row-reverse;}
  .avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .av-a{background:var(--bg-accent);}
  .av-b{background:var(--bg-pro);}
  .bubble{max-width:76%;padding:9px 13px;border-radius:15px;font-size:14px;line-height:1.65;border:.5px solid var(--border);}
  .bubble.left{background:var(--surface-2);border-bottom-left-radius:4px;color:var(--color-text-primary);}
  .bubble.right{background:var(--bg-pro);border-bottom-right-radius:4px;color:var(--color-text-pro);border-color:var(--border-pro);}
  .bname{font-size:11px;font-weight:500;color:var(--color-text-muted);margin-bottom:3px;padding:0 2px;}
  .bname.right{text-align:right;}
  .hl-prep{font-weight:500;color:var(--color-text-accent);}
  .hl-obj{font-weight:500;color:var(--color-text-success);}

  /* matching */
  .match-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:1rem;}
  .match-col-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-muted);margin-bottom:8px;}
  .sentence-list{display:flex;flex-direction:column;gap:7px;}
  .sentence-btn{-webkit-user-select: none; user-select: none; font-size:13px;padding:8px 12px;border-radius:var(--radius);border:.5px solid var(--border);background:var(--surface-2);color:var(--color-text-primary);cursor:pointer;text-align:left;transition:border-color .12s,background .12s;line-height:5.84;}
  .sentence-btn:hover:not(:disabled){background:var(--surface-1);border-color:var(--color-border-strong);}
  .sentence-btn.selected{border-color:black;background:var(--bg-accent);color:var(--color-text-accent);}
  .sentence-btn.correct{border: 4px solid var(--color-border-success);background:var(--color-bg-success);color:var(--color-text-success);pointer-events:none;}
  .sentence-btn.wrong{border-color:var(--border-danger);background:var(--bg-danger);color:var(--color-text-danger);animation:shake .3s;}
  .img-card{user-drag: none; -webkit-user-drag: none; -webkit-user-select: none; user-select: none; border:.5px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .12s;}
  .img-card:hover{border-color:var(--border-strong);}
  .img-card.selected{border-color:black;}
  .img-card.correct{border: 4px solid var(--color-border-success);pointer-events:none;}
  .img-card.wrong{border-color:var(--color-border-danger);animation:shake .3s;}
  .img-slot{height:80px;background:var(--surface-1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border-bottom:.5px solid var(--border);}
  .img-slot img{width:100%;height:100%;object-fit:contain;padding:6px;display:none;}
  .img-slot .ph-icon{font-size:22px;color:var(--color-text-muted);}
  .img-slot .ph-name{font-size:10px;color:var(--color-text-muted);font-family:var(--font-mono);}
  .img-label{font-size:12px;font-weight:500;text-align:center;padding:6px 8px;color:var(--color-text-secondary);}
  .img-grid-wrap{display:flex;flex-direction:column;gap:7px;}

  /* gap fill */
  .gap-para{background:var(--surface-2);border:.5px solid var(--border);border-radius:12px;padding:1rem 1.25rem;font-size:14px;line-height:2.5;margin-bottom:1rem;}
  input.gap{display:inline-block;border:none;border-bottom:2px solid var(--border-strong);border-radius:0;width:80px;font-size:14px;font-family:inherit;color:var(--color-text-primary);background:transparent;text-align:center;outline:none;padding:0 2px;vertical-align:baseline;}
  input.gap:focus{border-bottom-color:var(--border-accent);}
  input.gap.correct{border-bottom-color:var(--color-border-success);color:var(--color-text-success);}
  input.gap.wrong{border-bottom-color:var(--color-border-danger);color:var(--color-text-danger);}
  .bank{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem;}
  .bank-chip{font-size:13px;padding:4px 11px;border-radius:20px;background:var(--surface-1);border:.5px solid var(--border);color:var(--color-text-secondary);}
  .ex-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .score-msg{font-size:13px;color:var(--color-text-secondary);}
  .ak-body{padding:10px 14px;display:flex;flex-direction:column;gap:2px;}
  .ak-row{display:flex;gap:10px;align-items:baseline;padding:4px 0;border-bottom:.5px solid var(--border);font-size:13px;}
  .ak-row:last-child{border-bottom:none;}
  .ak-num{color:var(--color-text-muted);min-width:20px;}
  .ak-ans{font-weight:500;color:var(--color-text-accent);min-width:80px;}
  .ak-note{color:var(--color-text-muted);}
  details summary{user-select:none;list-style:none;display:flex;justify-content:space-between;align-items:center;}
  details summary::-webkit-details-marker{display:none;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  @media(max-width:480px){.match-grid{grid-template-columns:1fr;}}
</style>
<link rel="stylesheet" href="general.css">

</head>
<body class="exercise-page">

<!-- ══ MATCHING ══ -->
<div class="sec-div">exercise 1 — match the sentence to the picture</div>
<div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:1rem;">Click a sentence, then click the matching picture.</div>

<div class="match-grid">
  <div>
    <div class="match-col-label">Sentences</div>
    <div class="sentence-list" id="sent-list"></div>
  </div>
  <div>
    <div class="match-col-label">Pictures</div>
    <div class="img-grid-wrap" id="img-list"></div>
  </div>
</div>

<div class="ex-bar" style="margin-bottom:.5rem;">
  <button id="reset-match">↺ Reset</button>
  <span class="score-msg" id="match-fb"></span>
</div>


<script>
const matchItems = [
  { id:"m1", sentence:"The cat is on the sofa.",           prep:"on",          file:"eng_mats_images/cat_on_sofa.png"         },
  { id:"m2", sentence:"The cat is under the table.",        prep:"under",       file:"eng_mats_images/cat_under_table.png"      },
  { id:"m3", sentence:"The cat is next to the sofa.",      prep:"next_to",     file:"eng_mats_images/cat_next_to_sofa.png"    },
  { id:"m4", sentence:"The cat is behind the plant.",       prep:"behind",      file:"eng_mats_images/cat_behind_plant.png"     },
  { id:"m5", sentence:"The cat is between the cushions.",  prep:"between",     file:"eng_mats_images/cat_between_cushions.png"},
  { id:"m6", sentence:"The cat is in front of the sofa.",  prep:"in_front_of", file:"eng_mats_images/cat_in_front_of_sofa.png"},
  { id:"m7", sentence:"The cat is above the sofa.",        prep:"above",       file:"eng_mats_images/cat_above_sofa.png"      },
  { id:"m8", sentence:"The cat is on top of the sofa.",    prep:"on_top_of",   file:"eng_mats_images/cat_on_top_of_sofa.png"  },
];

let selectedSentence = null;
let matched = 0;

function buildMatch() {
  matched = 0; selectedSentence = null;
  document.getElementById('match-fb').textContent = '';

  const sentList = document.getElementById('sent-list');
  const imgList  = document.getElementById('img-list');
  sentList.innerHTML = ''; imgList.innerHTML = '';

  shuffle([...matchItems]).forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'sentence-btn';
    btn.dataset.id = item.id;
    btn.textContent = item.sentence;
    btn.addEventListener('click', () => selectSentence(btn, item));
    sentList.appendChild(btn);
  });

  shuffle([...matchItems]).forEach(item => {
    const card = document.createElement('div');
    card.className = 'img-card';
    card.dataset.id = item.id;

    const slot = document.createElement('div');
    slot.className = 'img-slot';

    const img = document.createElement('img');
    img.src = item.file;
    img.alt = item.sentence;
    img.addEventListener('load', () => {
      slot.querySelector('.ph-icon').style.display = 'none';
      slot.querySelector('.ph-name').style.display = 'none';
      img.style.display = 'block';
    });

    const phIcon = document.createElement('i');
    phIcon.className = 'ti ti-photo ph-icon';
    phIcon.setAttribute('aria-hidden','true');
    const phName = document.createElement('span');
    phName.className = 'ph-name';
    phName.textContent = item.file;

    slot.appendChild(phIcon); slot.appendChild(phName); slot.appendChild(img);
    const lbl = document.createElement('div');
    lbl.className = 'img-label';

    card.appendChild(slot); card.appendChild(lbl);
    card.addEventListener('click', () => selectImage(card, item));
    imgList.appendChild(card);
  });
}

function selectSentence(btn, item) {
  if (btn.classList.contains('correct')) return;
  document.querySelectorAll('.sentence-btn.selected').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedSentence = item;
}

function selectImage(card, item) {
  if (!selectedSentence) return;
  if (card.classList.contains('correct')) return;

  const sentBtn = document.querySelector(`.sentence-btn[data-id="${selectedSentence.id}"]`);

  if (selectedSentence.id === item.id) {
    card.classList.add('correct');
    if (sentBtn) { sentBtn.classList.remove('selected'); sentBtn.classList.add('correct'); sentBtn.disabled = true; }
    matched++;
    const fb = document.getElementById('match-fb');
    fb.textContent = matched === matchItems.length ? 'All matched!' : matched + ' / ' + matchItems.length + ' matched';
    fb.style.color = matched === matchItems.length ? 'var(--color-text-success)' : 'var(--color-text-secondary)';
  } else {
    card.classList.add('wrong');
    if (sentBtn) sentBtn.classList.add('wrong');
    setTimeout(() => { card.classList.remove('wrong'); if(sentBtn) sentBtn.classList.remove('wrong','selected'); }, 700);
  }
  selectedSentence = null;
  document.querySelectorAll('.sentence-btn.selected').forEach(b => b.classList.remove('selected'));
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b,a[j]]=[a[j],a[i]];a[i]=b;}return a;}
// safer shuffle
function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
  return b;
}

document.getElementById('reset-match').addEventListener('click', buildMatch);
buildMatch();

</script>

<div id="theme-toggle-wrap">
  <button id="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle light/dark mode">
    <span id="theme-icon">☀️</span>
  </button>
</div>
<script src="theme-toggle-behavior.js"></script>

</body>
</html>
