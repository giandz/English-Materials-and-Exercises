<html>
	<head><meta charset="UTF-8">
<style>
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
  .activity-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px;}
  .activity-hint{font-size:13px;color:var(--color-text-secondary);}
  .score-pill{font-size:13px;color:var(--color-text-secondary);}
  .bank-label{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:10px;}
  .bank{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.5rem;min-height:56px;padding:10px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-lg);border:.5px solid var(--color-border-tertiary);}
  .sent-chip{font-size:13px;padding:7px 12px;border-radius:var(--border-radius-md);border:1px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:grab;user-select:none;-webkit-user-select:none;touch-action:none;line-height:1.4;max-width:220px;}
  .sent-chip:active{cursor:grabbing;opacity:.7;}
  .sent-chip.dragging{opacity:.4;}
  .img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;}
  .img-card{border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-primary);}
  .img-slot{height:95px;background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;border-bottom:.5px solid var(--color-border-tertiary);transition:background .12s;position:relative;}
  .img-slot img{width:100%;height:100%;object-fit:contain;padding:6px;display:none;}
  .img-placeholder{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .img-placeholder i{font-size:22px;color:var(--color-text-tertiary);}
  .img-placeholder span{font-size:10px;color:var(--color-text-tertiary);font-family:var(--font-mono);}
  .img-slot.over{background:var(--color-background-info);}
  .img-slot.matched{background:var(--color-background-success);}
  .img-slot.wrong-flash{animation:shake .3s;}
  .drop-label{padding:7px 10px;min-height:36px;font-size:12px;color:var(--color-text-secondary);line-height:1.4;align-items:center;}
  .drop-label.placed-correct{color:var(--color-text-success);font-weight:500;}
  .reset-row{display:flex;gap:8px;align-items:center;margin-top:1.25rem;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
</style>
<link rel="stylesheet" href="general.css">

</head>
<body class="exercise-page">
	
<div style="padding:.75rem 0;">
  <div class="activity-bar">
    <span class="activity-hint"><i class="ti ti-drag-drop" aria-hidden="true" style="font-size:15px;vertical-align:-1px;margin-right:4px;"></i>Drag each sentence onto the matching picture.</span>
    <span class="score-pill"><span id="score">0</span> / 12 matched</span>
  </div>
  <div class="bank-label">Sentence bank</div>
  <div class="bank" id="bank"></div>
  <div class="img-grid" id="img-grid"></div>
  <div class="reset-row">
    <button id="reset-btn">↺ Reset</button>
    <span style="font-size:13px;color:var(--color-text-secondary);" id="fb-msg"></span>
  </div>
</div>

<script>
const items = [
  { id:"interest",    sentence:"Rex is very <b>interested</b> in his new plate, he doesn't know it's empty.",          file:"eng_mats_images/interest.png"    },
  { id:"bore",        sentence:"I was so <b>bored</b> by the talk show I fell asleep ten minutes in.",   file:"eng_mats_images/bore.png"        },
  { id:"excite",      sentence:"They are <b>excited</b> about the new anime and can't help but jump.",        file:"eng_mats_images/excite.png"      },
  { id:"frighten",    sentence:"My wife and I were <b>frightened</b> by the special effects at the movie.",        file:"eng_mats_images/frighten.png"    },
  { id:"tire",        sentence:"He is already <b>tired</b> of working and it's only lunch break.",           file:"eng_mats_images/tire.png"        },
  { id:"confuse",     sentence:"I was very <b>confused</b> by the new sport that this kid invented.",    file:"eng_mats_images/confuse.png"     },
  { id:"annoy",       sentence:"My grandfather got very <b>annoyed</b> at the kids' soccer practice.",             file:"eng_mats_images/annoy.png"       },
  { id:"disappoint",  sentence:"Mike's parents were <b>disappointed</b> by all the F's in his report card.",    file:"eng_mats_images/disappoint.png"  },
  { id:"embarrass",   sentence:"The professor was so <b>embarrassed</b> he forgot how to do math.", file:"eng_mats_images/embarrass.png"   },
  { id:"satisfy",     sentence:"The customer was very <b>satisfied</b> by the quality of the meal.",         file:"eng_mats_images/satisfy.png"     },
  { id:"shock",       sentence:"Her parents were <b>shocked</b> when they met her new boyfriend.",              file:"eng_mats_images/shock.png"       },
  { id:"surprise",    sentence:"She was <b>surprised</b> by the cat, who was inside the washing machine.",        file:"eng_mats_images/surprise.png"    },
];

const TOTAL = items.length;
let matched = 0;
let dragging = null;
let touchClone = null;

function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
  return b;
}

function makeDraggable(chip){
  chip.setAttribute('draggable','true');

  chip.addEventListener('dragstart',e=>{
    dragging=chip;chip.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
  });
  chip.addEventListener('dragend',()=>{
    chip.classList.remove('dragging');dragging=null;
  });

  chip.addEventListener('touchstart',e=>{
    e.preventDefault();
    dragging=chip;chip.classList.add('dragging');
    const r=chip.getBoundingClientRect();
    touchClone=chip.cloneNode(true);
    touchClone.style.cssText=`position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;pointer-events:none;opacity:.85;z-index:9999;margin:0;touch-action:none;`;
    document.body.appendChild(touchClone);
  },{passive:false});

  chip.addEventListener('touchmove',e=>{
    e.preventDefault();if(!touchClone)return;
    const t=e.touches[0];const r=touchClone.getBoundingClientRect();
    touchClone.style.left=(t.clientX-r.width/2)+'px';
    touchClone.style.top=(t.clientY-r.height/2)+'px';
    touchClone.style.display='none';
    const el=document.elementFromPoint(t.clientX,t.clientY);
    touchClone.style.display='';
    document.querySelectorAll('.img-slot').forEach(z=>z.classList.remove('over'));
    const zone=el?el.closest('.img-slot'):null;
    if(zone&&!zone.dataset.matched)zone.classList.add('over');
  },{passive:false});

  chip.addEventListener('touchend',e=>{
    e.preventDefault();
    if(touchClone){touchClone.remove();touchClone=null;}
    if(dragging)dragging.classList.remove('dragging');
    document.querySelectorAll('.img-slot').forEach(z=>z.classList.remove('over'));
    const t=e.changedTouches[0];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const zone=el?el.closest('.img-slot'):null;
    if(zone){
      const itemId=zone.dataset.id;
      const item=items.find(i=>i.id===itemId);
      handleDrop(zone,item);
    }
    dragging=null;
  },{passive:false});
}

function handleDrop(zone,item){
  if(!dragging||!zone||!item)return;
  if(zone.dataset.matched)return;
  const chipId=dragging.dataset.id;
  const zoneId=zone.dataset.id;
  const lbl=document.getElementById('lbl-'+zoneId);

  if(chipId===zoneId){
    zone.dataset.matched='true';
    zone.classList.add('matched');
    if(lbl){lbl.innerHTML=dragging.innerHTML;lbl.classList.add('placed-correct');}
    dragging.remove();
    matched++;
    document.getElementById('score').textContent=matched;
    if(matched===TOTAL){
      const fb=document.getElementById('fb-msg');
      fb.textContent='All matched! Well done!';
      fb.style.color='var(--color-text-success)';
    }
  } else {
    zone.classList.add('wrong-flash');
    const d=dragging;
    setTimeout(()=>{zone.classList.remove('wrong-flash');},500);
  }
  dragging=null;
}

function wireZones(){
  document.querySelectorAll('.img-slot').forEach(zone=>{
    zone.addEventListener('dragover',e=>{e.preventDefault();if(!zone.dataset.matched)zone.classList.add('over');});
    zone.addEventListener('dragleave',()=>zone.classList.remove('over'));
    zone.addEventListener('drop',e=>{
      e.preventDefault();zone.classList.remove('over');
      const item=items.find(i=>i.id===zone.dataset.id);
      handleDrop(zone,item);
    });
  });
}

function build(){
  matched=0;dragging=null;
  if(touchClone){touchClone.remove();touchClone=null;}
  document.getElementById('score').textContent='0';
  document.getElementById('fb-msg').textContent='';

  const bank=document.getElementById('bank');
  bank.innerHTML='';
  shuffle(items.map(item=>({...item}))).forEach(item=>{
    const chip=document.createElement('div');
    chip.className='sent-chip';
    chip.dataset.id=item.id;
    chip.innerHTML=item.sentence;
    bank.appendChild(chip);
    makeDraggable(chip);
  });

  const grid=document.getElementById('img-grid');
  grid.innerHTML='';
  shuffle(items.map(item=>({...item}))).forEach(item=>{
    const card=document.createElement('div');
    card.className='img-card';

    const slot=document.createElement('div');
    slot.className='img-slot';
    slot.dataset.id=item.id;

    const ph=document.createElement('div');
    ph.className='img-placeholder';
    ph.innerHTML=`<i class="ti ti-photo" aria-hidden="true"></i><span>${item.file}</span>`;

    const img=document.createElement('img');
    img.src=item.file;
    img.alt=item.id;
    img.addEventListener('load',()=>{ph.style.display='none';img.style.display='block';});

    slot.appendChild(ph);slot.appendChild(img);

    const lbl=document.createElement('div');
    lbl.className='drop-label';
    lbl.id='lbl-'+item.id;

    card.appendChild(slot);card.appendChild(lbl);
    grid.appendChild(card);
  });

  wireZones();
}

document.getElementById('reset-btn').addEventListener('click',build);
build();
</script>
<div id="theme-toggle-wrap">
  <button id="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle light/dark mode">
    <span id="theme-icon">☀️</span>
  </button>
</div>
<script src="theme-toggle-behavior.js"></script>

</body>
</html>
